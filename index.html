<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historic Buildings Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Historic Buildings Library</h1>
    <p class="subtitle">Digital archive for historic structures, images, and 3D documentation datasets</p>
  </header>

  <section class="controls">
    <input type="text" id="search" placeholder="Search buildings..." />
  </section>

  <main id="container"></main>

  <div id="modal" class="modal">
    <div class="modal-content">
      <button id="close" class="close-btn">&times;</button>

      <div class="modal-grid">
        <div class="info-panel">
          <img id="modal-img" alt="Building image" />
          <h2 id="modal-title"></h2>
          <p id="modal-meta"></p>
          <p id="modal-info"></p>
          <p id="modal-scan"></p>
        </div>

        <div class="viewer-panel">
          <h3>3D Documentation Viewer</h3>
          <div id="viewer"></div>
          <p class="viewer-help">Drag to rotate • Scroll to zoom • Shift + drag to pan</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
